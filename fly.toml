# Fly.io config for Talerooms. Deploy with `fly deploy`.
# App name is global on Fly — change it here if "talerooms" is taken.
app = "talerooms"
primary_region = "sin"   # Singapore — closest to the target market

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep one machine always on (continuous, no cold starts). With a single
  # machine the uploads volume below stays consistent.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    method = "get"
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"   # allow boot + first DB connection before checking

# Persist uploaded avatars and feed wallpapers across deploys/restarts.
[mounts]
  source = "talerooms_uploads"
  destination = "/app/public/uploads"

[[vm]]
  size = "shared-cpu-1x"
  # 1 GB headroom for the in-process embedding model used by the similarity
  # check. Bump to 2048 if publishes ever OOM.
  memory = "1024"
